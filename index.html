<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift Donate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.2/jquery.min.js"></script>
    
    <style>
        /* --- GLOBAL & PREFERENCES --- */
        body { 
            margin: 0; padding: 0; font-family: 'Nunito', sans-serif; background-color: #1a1a1a; 
            overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center;
            -webkit-touch-callout: none; -webkit-user-select: none; -moz-user-select: none; user-select: none;
        }

        .app-container {
            width: 100%; max-width: 450px; height: 100%; max-height: 850px; 
            background-color: #fff; position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        }

        @media (min-width: 768px) { .app-container { border-radius: 20px; border: 8px solid #2d2d2d; height: 90vh; } }

        .roblox-font { font-family: 'Fredoka One', cursive; letter-spacing: 0.5px; }
        .hidden { display: none !important; }
        
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto; background: #fff; opacity: 0; pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.4s; transform: scale(0.95);
        }
        .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); z-index: 10; }
        
        img { -webkit-user-drag: none; }
        .btn-3d { transition: transform 0.1s, border-bottom-width 0.1s; }
        .btn-3d:active { transform: translateY(4px); border-bottom-width: 0px !important; margin-bottom: 4px; }

        .header-bg { background: linear-gradient(135deg, #e91e63, #c2185b); border-bottom: 4px solid #880e4f; }
        .input-group { background-color: #f3f4f6; border: 2px solid #e5e7eb; border-radius: 16px; padding: 12px; margin-bottom: 20px; transition: 0.2s; }
        .input-group:focus-within { border-color: #e91e63; background-color: #fff; box-shadow: 0 4px 12px rgba(233, 30, 99, 0.15); }
        .input-group input { width: 100%; background: transparent; border: none; outline: none; font-size: 16px; color: #374151; font-weight: 700; }
        .label-text { font-size: 13px; font-weight: 900; color: #6b7280; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.8px; }
        
        .btn-blue {
            background-color: #3b82f6; color: white; width: 100%; padding: 16px; border-radius: 16px; 
            font-size: 20px; font-family: 'Fredoka One', cursive; text-transform: uppercase; 
            letter-spacing: 1px; border-bottom: 6px solid #1d4ed8; cursor: pointer; 
        }

        .toggle-bg { position: relative; width: 56px; height: 32px; background-color: #10b981; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .toggle-dot { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; background-color: white; border-radius: 50%; transition: 0.3s; }
        .toggle-bg.off { background-color: #d1d5db; }
        .toggle-bg.off .toggle-dot { right: 28px; }

        .wood-leg { position: fixed; bottom: 0; width: 30px; height: 100%; background: repeating-linear-gradient(90deg, #8d5e3a, #7a4e2e 10px); z-index: 0; border-radius: 8px; border: 2px solid #5d3a22; }
        .wood-plank { background-color: #b37a4c; border: 3px solid #6d4c41; border-bottom: 8px solid #5d4037; border-radius: 12px; position: relative; z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .btn-robux { background-color: #4caf50; border-bottom: 5px solid #2e7d32; color: white; font-weight: 800; border-radius: 12px; padding: 12px 5px; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 14px; width: 100%; }

        .modal-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-bg.active { opacity: 1; pointer-events: auto; }
        .card-dark { background-color: #1f2937; width: 90%; max-width: 380px; border-radius: 24px; overflow: hidden; color: white; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid #374151; }
        .card-light { background-color: white; width: 90%; max-width: 380px; border-radius: 24px; overflow: hidden; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-height: 85%; display: flex; flex-direction: column; }
        .modal-bg.active .card-dark, .modal-bg.active .card-light { transform: scale(1); }

        .offers-scroll-container { max-height: 320px; overflow-y: auto; padding-right: 5px; }
        .offers-scroll-container::-webkit-scrollbar { width: 6px; }
        .offers-scroll-container::-webkit-scrollbar-thumb { background: #e91e63; border-radius: 4px; }

        .offer-card { background: #fff; border: 2px solid #f3f4f6; border-bottom: 4px solid #e5e7eb; border-radius: 12px; padding: 14px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 4px; position: relative; }
        .offer-card:hover { border-color: #e91e63; transform: translateY(-2px); }
        .hot-sticker { position: absolute; top: -10px; right: 10px; background: linear-gradient(45deg, #ff4d4d, #f44336); color: white; padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; z-index: 5; transform: rotate(5deg); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #e91e63; border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
    <script>
        const SERVER_URL = "/api/check"; 
        let userData = { name: "", avatar: "https://slelguoygbfzlpylpxfs.supabase.co/storage/v1/render/image/public/project-uploads/8c757f06-70fb-4925-b654-33a0a1a38e37/image-1768457594705.png?width=8000&height=8000&resize=contain" };
        
        let allAvailableOffers = []; 
        let currentOfferIndex = 0;   
        let completedCount = 0;      
        let currentProgress = 0;     
        let completedOfferIds = [];

        function playSfx(type) {
            const audio = document.getElementById(type === 'btn' ? 'sfx-btn' : 'sfx-click');
            if(audio) { audio.currentTime = 0; audio.play().catch(e => {}); }
        }

        function toggleSwitch(el) { playSfx('click'); el.classList.toggle('off'); }

        function switchScreen(hideId, showId) {
            $(`#${hideId}`).removeClass('active');
            setTimeout(() => { $(`#${showId}`).addClass('active'); }, 300);
        }

        function handleUserCheck() {
            playSfx('btn');
            const user = $('#username-input').val().trim();
            if (!user) { $('#username-input').css('border-color', 'red'); return; }
            $('#btn-proceed').attr('disabled', true).text('SEARCHING...').css('opacity', '0.7');
            setTimeout(() => { userData.name = user; updateUI(); }, 1500);
        }

        function updateUI() {
            $('#stand-title').text(`${userData.name}'s Stand`);
            $('#stand-avatar').attr('src', userData.avatar);
            $('#confirm-name').text(userData.name);
            $('#confirm-avatar').attr('src', userData.avatar);
            switchScreen('screen-login', 'screen-stand');
            setTimeout(() => { $('#btn-proceed').attr('disabled', false).text('PROCEED').css('opacity', '1'); }, 1000);
        }

        function showConfirm(amount) {
            $('#confirm-amt, #btn-final-amt').text(amount.toLocaleString());
            $('#modal-confirm').addClass('active');
        }

        function showCaptcha() {
            $('#modal-confirm').removeClass('active');
            setTimeout(() => { $('#modal-captcha').addClass('active'); }, 200);
        }

        function closeModals() {
            $('.modal-bg').removeClass('active');
            setTimeout(() => {
                $('#captcha-step-1').removeClass('hidden');
                $('#offer-step, #success-step').addClass('hidden');
                $('#captcha-header-text').text("HUMAN VERIFICATION");
            }, 300);
        }

        function executeLocker() {
            $('#captcha-step-1').addClass('hidden');
            $('#offer-step').removeClass('hidden').addClass('flex'); 
            $('#captcha-header-text').text("COMPLETE TASKS");
            fetchOffers();
        }
        
        function fetchOffers() {
            $("#loading-offers").removeClass('hidden');
            $("#offers-list").empty();
            
            $.getJSON("https://api.ipify.org?format=json", function(ipData) {
                const apiURL = `/api/offers?ip=${ipData.ip}&user_agent=${encodeURIComponent(navigator.userAgent)}`;
                
                $.ajax({
                    url: apiURL,
                    method: "GET",
                    dataType: "json",
                    success: function(data) {
                        $("#loading-offers").addClass('hidden');
                        if (data.offers && data.offers.length > 0) {
                            allAvailableOffers = data.offers
                                .filter(offer => !completedOfferIds.includes(offer.id))
                                .sort((a, b) => parseFloat(b.payout) - parseFloat(a.payout));
                            
                            currentOfferIndex = 0;
                            updateProgressBar(currentProgress); 
                            const initialLoadCount = Math.min(5, allAvailableOffers.length);
                            for (let i = 0; i < initialLoadCount; i++) {
                                renderOfferCard(allAvailableOffers[i]);
                                currentOfferIndex++;
                            }
                        } else {
                            $("#offers-list").html('<p class="text-xs text-center text-gray-400 mt-4">No tasks available.</p>');
                        }
                    }
                });
            });
        }

        // --- THE FIXED RENDER FUNCTION ---
        function renderOfferCard(offer) {
            if (!offer || !offer.id) return; // Prevent creating broken cards
            
            let sticker = (offer.payout > 0.5) ? '<div class="hot-sticker">🔥 HOT</div>' : '';
            
            // ENSURE ID IS DEFINED: Use offer.id directly here
            const trackId = `user_${offer.id}_${Math.floor(Math.random() * 1000000)}`;
            
            // Strip any bad parameters and rebuild clean link
            let cleanBase = offer.link.split('&aff_sub5=')[0];
            let finalLink = cleanBase + (cleanBase.includes('?') ? '&' : '?') + `aff_sub5=${trackId}`;
            
            let html = `
                <div class="offer-card" onclick="openOffer('${finalLink}', '${trackId}', ${offer.id}, this); playSfx('click')">
                    ${sticker}
                    <h4 class="font-bold text-gray-800 text-sm pr-6">${offer.name}</h4>
                    <p class="text-xs text-gray-500 mt-1 leading-tight">Complete this task to verify.</p>
                    <div class="offer-btn mt-2 bg-[#e91e63] text-white text-[10px] font-bold text-center py-2 rounded uppercase">START TASK</div>
                </div>
            `;
            $("#offers-list").append(html);
        }

        function openOffer(url, trackId, offerId, el) {
            $(el).find('.offer-btn').text('Checking...').css('background', '#9ca3af');
            window.open(url, '_blank');

            const checkInterval = setInterval(() => {
                fetch(`${SERVER_URL}?tracking_id=${trackId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'completed') {
                        clearInterval(checkInterval);
                        completedOfferIds.push(offerId); 
                        handleOfferCompletion(el);
                    }
                });
            }, 5000);
        }

        function handleOfferCompletion(el) {
            playSfx('btn');
            completedCount++;
            if (completedCount === 1) currentProgress = 50;
            else if (completedCount === 2) currentProgress = 75;
            else if (completedCount === 3) currentProgress = 80;
            else if (completedCount === 4) currentProgress = 86;
            else if (completedCount === 5) currentProgress = 89;
            else if (completedCount === 6) currentProgress = 90;
            else if (currentProgress < 99) currentProgress += 1;

            $(el).fadeOut(300, function() {
                $(this).remove();
                if (currentOfferIndex < allAvailableOffers.length) {
                    renderOfferCard(allAvailableOffers[currentOfferIndex]);
                    currentOfferIndex++;
                }
                updateProgressBar(currentProgress);
            });
        }

        function updateProgressBar(percent) {
            $('#progress-fill').css('width', `${percent}%`);
            $('#progress-text').text(`${percent}%`);
        }

        // --- SECURITY ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) return false; };
    </script>
</body>
</html>
